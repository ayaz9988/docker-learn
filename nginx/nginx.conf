# ═══════════════════════════════════════════════════════════════════════════════
# nginx.conf — Reverse proxy for the Node.js API
# ═══════════════════════════════════════════════════════════════════════════════
#
# This file is mounted inside nginx at /etc/nginx/conf.d/default.conf,
# which is included within nginx's main http { } block. That means this
# file can contain http-level directives, server blocks, and location blocks.
#
# Architecture:
#   Browser ──:80──→ nginx ──:3000──→ Node.js API ──:6379──→ Redis
#
# Why put nginx in front?
#   - Rate limiting (protect API from abuse)
#   - SSL/TLS termination (add HTTPS without changing the app)
#   - Static file serving (if needed)
#   - Request buffering, timeouts, header manipulation
#   - Can switch between API versions without changing the app

# ── Rate limiting zone ──────────────────────────────────────────────────────
# limit_req_zone is an http-level directive — it cannot live inside a
# server block. It defines a shared memory zone that tracks request rates
# per client IP. Using $binary_remote_addr instead of $remote_addr halves
# memory usage (binary IP vs string).
#
#   10 MB can hold ~160 000 unique IP entries.
#   10 requests/second is a reasonable per-IP limit for most APIs.
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# ── Docker Swarm DNS resolver ──────────────────────────────────────────────
# In Swarm, nginx starts before the api service DNS is ready.
# Without a resolver, nginx resolves "api" ONCE at boot and caches it.
# If resolution fails (service not ready), nginx exits — crash loop.
#
# With resolver + variable proxy_pass, nginx resolves per-request:
#   resolver 127.0.0.11         — Docker's embedded DNS
#   valid=5s                    — Re-resolve every 5 seconds
#   ipv6=off                    — Avoid IPv6 routing mesh issues
#   set $backend ...;           — Variable forces per-request resolution
#   proxy_pass $backend;        — Nginx resolves $backend fresh each time
resolver 127.0.0.11 valid=5s ipv6=off;

server {
    listen 80;
    server_name localhost;

    location / {
        # Apply rate limiting. burst=20 allows short bursts above the limit.
        # nodelay means excess requests are rejected immediately (no queuing).
        limit_req zone=api_limit burst=20 nodelay;

        # Forward requests to the API service.
        # Using a variable ($backend) instead of a fixed URL forces nginx
        # to re-resolve DNS on every request via the resolver above.
        # This prevents the crash-loop when api isn't ready at nginx boot.
        set $backend "http://api:3000";
        proxy_pass $backend;

        # ── Headers forwarded to the backend ─────────────────────────────
        # The backend (our Node.js app) needs to know the original client
        # details because it sees nginx's local connection, not the browser.
        proxy_set_header Host                  $host;
        proxy_set_header X-Real-IP             $remote_addr;
        proxy_set_header X-Forwarded-For       $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto     $scheme;

        # ── Timeouts ─────────────────────────────────────────────────────
        # Prevents nginx from hanging onto connections forever.
        proxy_connect_timeout   5s;
        proxy_read_timeout      10s;
        proxy_send_timeout      10s;

        # ── Buffering ────────────────────────────────────────────────────
        # Disable buffering for streaming-like responses.
        # API responses are typically small JSON, so we keep it simple.
        proxy_buffering         off;
    }
}
